name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PRE_COMMIT_HOME: /tmp/pre-commit-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run Ruff
        run: ruff check .

      - name: Run Black check
        run: black --check .

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Run tests with coverage
        run: |
          pytest --cov=adb_bug_report_generator --cov-report=term-missing --cov-report=xml

      - name: Build package
        run: python -m build --no-isolation

      - name: Verify packaged import
        run: |
          python -m pip install dist/*.whl
          python -c "import adb_bug_report_generator"

      - name: Publish test summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import pathlib
          import xml.etree.ElementTree as ET

          junit_path = pathlib.Path("pytest-results.xml")
          summary_target = os.environ.get("GITHUB_STEP_SUMMARY")

          if junit_path.exists() and summary_target:
              root = ET.parse(junit_path).getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")
              if suite is not None:
                  tests = int(suite.attrib.get("tests", 0))
                  failures = int(suite.attrib.get("failures", 0))
                  errors = int(suite.attrib.get("errors", 0))
                  skipped = int(suite.attrib.get("skipped", 0))
                  summary_lines = [
                      "## Pytest Results",
                      "",
                      f"- Tests: {tests}",
                      f"- Failures: {failures}",
                      f"- Errors: {errors}",
                      f"- Skipped: {skipped}",
                  ]
                  with open(summary_target, "a", encoding="utf-8") as handle:
                      handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Upload coverage and test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            pytest-results.xml
            coverage.xml
            dist/

  emulator-smoke:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          emulator-port: 5554
          disable-animations: true
          script: |
            export ADB_RUN_EMULATOR_SMOKE=1
            export ADB_EMULATOR_SERIAL=emulator-5554
            pytest tests/e2e/test_emulator_smoke.py -q
